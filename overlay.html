<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GutCheck — Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .analysis-container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .header {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .status-message {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 16px;
    }
    .camera-feed {
      width: 240px;
      height: 180px;
      border-radius: 12px;
      border: 2px solid rgba(99, 102, 241, 0.4);
      margin: 0 auto 20px;
      overflow: hidden;
      background: #111;
    }
    .camera-feed video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .sample-count {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="analysis-container">
    <div class="header">🔍 REACTR AUTHENTIC</div>
    <div class="status-message" id="status">Initializing camera...</div>
    <div class="camera-feed">
      <video id="cameraPreview" autoplay muted playsinline></video>
    </div>
    <div class="progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0%</div>
    <div class="sample-count" id="sampleCount">0 expression samples captured</div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
